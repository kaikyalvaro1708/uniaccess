name: CI — Backend

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"

jobs:

  # ─────────────────────────────────────────────
  # backend — compile
  # ─────────────────────────────────────────────
  backend-compile:
    name: Backend — Compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/identity-provisioning-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn compile --no-transfer-progress -q

  # ─────────────────────────────────────────────
  # backend — tests
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    needs: backend-compile
    defaults:
      run:
        working-directory: backend/identity-provisioning-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn test --no-transfer-progress

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/identity-provisioning-api/target/surefire-reports/
