name: CI — Backend & Frontend

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/ci.yml"

jobs:

  # ─────────────────────────────────────────────
  # backend — compile
  # ─────────────────────────────────────────────
  backend-compile:
    name: Backend — Compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/identity-provisioning-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn compile --no-transfer-progress -q

  # ─────────────────────────────────────────────
  # backend — tests
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    needs: backend-compile
    defaults:
      run:
        working-directory: backend/identity-provisioning-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn test --no-transfer-progress

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/identity-provisioning-api/target/surefire-reports/

  # ─────────────────────────────────────────────
  # frontend — lint
  # ─────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # ─────────────────────────────────────────────
  # frontend — build (tsc + vite)
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
